apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "locked-init.webhookName" . }}
  labels:
    {{- include "locked-init.labels" . | nindent 4 }}
webhooks:
  - name: {{ include "locked-init.fullname" . }}.{{ .Release.Namespace }}.svc
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    reinvocationPolicy: IfNeeded
    clientConfig:
      # caBundle is injected automatically by the CertRotator.
      service:
        name: {{ include "locked-init.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-pods
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    objectSelector:
      matchExpressions:
        - key: locked-init.io/run-once
          operator: DoesNotExist
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ .Release.Namespace }}
            {{- range .Values.excludedNamespaces }}
            - {{ . }}
            {{- end }}
