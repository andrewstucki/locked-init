apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "locked-init.fullname" . }}
  labels:
    {{- include "locked-init.labels" . | nindent 4 }}
rules:
  # Cert rotator: manage TLS secret.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Cert rotator: inject caBundle into MutatingWebhookConfiguration.
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Lease reaper: list and delete completed Leases.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "delete"]
  # Lease reaper: enumerate namespaces.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "locked-init.fullname" . }}
  labels:
    {{- include "locked-init.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "locked-init.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "locked-init.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
